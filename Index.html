<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dada_K_Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="main-container">
    
    <div class="container">
      
      <div class="nav-like">
        <div class="title"><h4>Sign in</h4></div>
        <div class="logo">
          <img class="main-logo" src="C:\Users\HP\Downloads\dada k logo 2025.png" alt="Dada_K Logo" />
        </div>
      </div>
      
      <div class="parent">
        <div class="form-login">
          <div class="sub-title"><h5>Dada_K_Login</h5></div>
          
          <div class="input-fields">
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Username" />
            </div>
            
            <div class="input-group password-group">
              <i class="fas fa-lock"></i>
              <input type="password" placeholder="Password" />
              <div class="show-password">
                <i class="fas fa-eye"></i>
              </div>
            </div>
          </div>
          
          <div class="keep">
            <input class="checkbox" type="checkbox" id="keep-me-signed-in" />
            <label for="keep-me-signed-in">Keep me signed in</label>
          </div>
          
          <button>Sign in</button>
          
          <div class="forget">
            <a href="">Forget Username?</a>
            <p>or</p>
            <a href="">Forget Password?</a>
          </div>
        </div>
      </div>

      <div class="socials">
        <div class="social-icons">
          <i class="fab fa-google"></i>
          <i class="fab fa-facebook-f"></i>
          <i class="fab fa-github"></i>
          <i class="fab fa-instagram"></i>
          <i class="fab fa-linkedin-in"></i>
          <i class="fab fa-apple"></i>
        </div>
      </div>
      
      <div class="no-account">
        <p class="no-account-text">Don't have an account?</p>
        <a href="">Create an account</a>
      </div>
      
    </div>
  </div>
</body>
</html>
